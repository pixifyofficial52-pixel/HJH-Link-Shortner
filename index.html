<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJ-HACKER | Professional Link Shortner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Animated Background */
        body::before {
            content: '';
            position: fixed;
            width: 300%;
            height: 300%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveBackground 20s linear infinite;
            opacity: 0.3;
        }

        @keyframes moveBackground {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100px, -100px); }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 550px;
            width: 100%;
            position: relative;
            backdrop-filter: blur(10px);
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Logo Circle */
        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .logo-circle {
            width: 100px;
            height: 100px;
            margin: 0 auto;
            border-radius: 50%;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            border: 3px solid white;
            transition: transform 0.3s;
        }

        .logo-circle:hover {
            transform: scale(1.05);
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        h1 {
            text-align: center;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            font-size: 32px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input {
            width: auto;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .result {
            margin-top: 20px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
            display: none;
        }

        .result.show {
            display: block;
            animation: slideDown 0.4s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-top: 10px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 12px;
            border-radius: 10px;
            text-align: center;
        }

        .short-url {
            background: white;
            padding: 12px;
            border-radius: 10px;
            margin: 15px 0;
            text-align: center;
        }

        .short-url a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
            word-break: break-all;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .copy-btn, .show-data-btn, .share-btn {
            flex: 1;
            padding: 10px;
            font-size: 14px;
            border-radius: 10px;
        }

        .copy-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }

        .show-data-btn {
            background: linear-gradient(135deg, #ee5a24 0%, #f093fb 100%);
        }

        .share-btn {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        /* Social Media Section */
        .social-section {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #e0e0e0;
        }

        .social-title {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
            text-align: center;
        }

        .social-buttons {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .social-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            text-decoration: none;
            transition: all 0.3s;
            font-size: 20px;
        }

        .social-icon:hover {
            transform: translateY(-3px);
        }

        .whatsapp { background: #25D366; }
        .facebook { background: #1877F2; }
        .twitter { background: #1DA1F2; }
        .telegram { background: #0088cc; }
        .linkedin { background: #0077b5; }

        .password-info {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <div class="logo-circle">
                <img src="https://i.postimg.cc/dVWsQpKw/IMG-20250913-WA0039.jpg" alt="Logo">
            </div>
        </div>
        <h1>🔗 HJ-HACKER</h1>
        <p class="subtitle">Professional Link Shortener with Advanced Features</p>

        <form id="linkForm">
            <div class="form-group">
                <label>🔗 Long URL</label>
                <input type="url" id="longUrl" placeholder="https://example.com" required>
            </div>

            <div class="form-group">
                <label>🔒 Password Protection (Optional)</label>
                <input type="password" id="password" placeholder="Leave empty for no password">
                <div class="password-info">Set a password to protect your link</div>
            </div>

            <div class="form-group">
                <label>🎨 Animation Style</label>
                <select id="animationStyle">
                    <option value="rgb">RGB Ring</option>
                    <option value="loading">Loading Bar</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="captureCamera">
                <label>📸 Capture Camera (Takes visitor's photo)</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="captureLocation">
                <label>📍 Capture Location (Requests GPS coordinates)</label>
            </div>

            <div class="form-group">
                <label>⏰ Expiration Date (Optional)</label>
                <input type="datetime-local" id="expirationDate">
            </div>

            <button type="submit" id="submitBtn">✨ Create Short Link</button>
        </form>

        <div id="result" class="result"></div>
        <div id="error" class="error"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyAzr3Xxh0YrTH5vp00Z-eQysTM35dNmh8I",
            authDomain: "hjh-tools.firebaseapp.com",
            databaseURL: "https://hjh-tools-default-rtdb.firebaseio.com",
            projectId: "hjh-tools",
            storageBucket: "hjh-tools.firebasestorage.app",
            messagingSenderId: "643137472905",
            appId: "1:643137472905:web:814ca23a86fb084811b958"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        function encodeForFirebase(text) {
            return btoa(encodeURIComponent(text)).replace(/=+$/, '');
        }

        function decodeFromFirebase(encoded) {
            try {
                return decodeURIComponent(atob(encoded));
            } catch(e) {
                return encoded;
            }
        }

        function generateShortCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        async function saveToFirebase(domain, shortCode, data) {
            const encodedDomain = encodeForFirebase(domain);
            const path = `domains/${encodedDomain}/${shortCode}`;
            await database.ref(path).set(data);
            return true;
        }

        async function isShortCodeUnique(domain, shortCode) {
            const encodedDomain = encodeForFirebase(domain);
            const path = `domains/${encodedDomain}/${shortCode}`;
            const snapshot = await database.ref(path).get();
            return !snapshot.exists();
        }

        async function getUniqueShortCode(domain) {
            let shortCode;
            let isUnique = false;
            while (!isUnique) {
                shortCode = generateShortCode();
                isUnique = await isShortCodeUnique(domain, shortCode);
            }
            return shortCode;
        }

        window.openAdminPanel = function() {
            window.open('/admin.html', '_blank');
        };

        window.shareOnSocial = function(platform, url) {
            const shareUrls = {
                whatsapp: `https://wa.me/?text=${encodeURIComponent(url)}`,
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
                twitter: `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}`,
                telegram: `https://t.me/share/url?url=${encodeURIComponent(url)}`,
                linkedin: `https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(url)}`
            };
            window.open(shareUrls[platform], '_blank', 'width=600,height=400');
        };

        document.getElementById('linkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Creating...';
            
            const longUrl = document.getElementById('longUrl').value;
            const password = document.getElementById('password').value;
            const animationStyle = document.getElementById('animationStyle').value;
            const captureCamera = document.getElementById('captureCamera').checked;
            const captureLocation = document.getElementById('captureLocation').checked;
            const expirationDate = document.getElementById('expirationDate').value;
            
            if (!longUrl.startsWith('http://') && !longUrl.startsWith('https://')) {
                showError('Please enter a valid URL');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✨ Create Short Link';
                return;
            }
            
            const currentDomain = window.location.hostname;
            const baseUrl = `${window.location.protocol}//${currentDomain}`;
            
            try {
                const shortCode = await getUniqueShortCode(currentDomain);
                
                const linkData = {
                    longUrl: longUrl,
                    shortCode: shortCode,
                    animationStyle: animationStyle,
                    captureCamera: captureCamera,
                    captureLocation: captureLocation,
                    createdAt: Date.now(),
                    clicks: 0
                };
                
                if (password) {
                    linkData.password = btoa(password);
                    linkData.hasPassword = true;
                }
                
                if (expirationDate) {
                    linkData.expiresAt = new Date(expirationDate).getTime();
                }
                
                await saveToFirebase(currentDomain, shortCode, linkData);
                
                const shortUrl = `${baseUrl}/${shortCode}`;
                showSuccessWithDataButton(shortUrl, linkData, password);
                
                document.getElementById('linkForm').reset();
                
            } catch (error) {
                showError('Failed: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✨ Create Short Link';
            }
        });
        
        function showSuccessWithDataButton(shortUrl, data, password) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="success">
                    ✅ Short link created successfully!
                </div>
                <div class="short-url">
                    <strong>Your Short URL:</strong><br>
                    <a href="${shortUrl}" target="_blank">${shortUrl}</a>
                </div>
                ${password ? `<div style="text-align:center;margin:10px;padding:10px;background:#fff3cd;border-radius:8px;">🔒 Password: <strong>${password}</strong><br><small>Share this password with visitor</small></div>` : ''}
                <div class="button-group">
                    <button class="copy-btn" onclick="copyToClipboard('${shortUrl}')">📋 Copy</button>
                    <button class="show-data-btn" onclick="openAdminPanel()">📊 Data</button>
                    <button class="share-btn" onclick="showShareOptions('${shortUrl}')">📢 Share</button>
                </div>
                <div class="social-section" id="socialSection" style="display:none;">
                    <div class="social-title">Share on Social Media</div>
                    <div class="social-buttons">
                        <a href="#" onclick="shareOnSocial('whatsapp','${shortUrl}');return false;" class="social-icon whatsapp">📱</a>
                        <a href="#" onclick="shareOnSocial('facebook','${shortUrl}');return false;" class="social-icon facebook">📘</a>
                        <a href="#" onclick="shareOnSocial('twitter','${shortUrl}');return false;" class="social-icon twitter">🐦</a>
                        <a href="#" onclick="shareOnSocial('telegram','${shortUrl}');return false;" class="social-icon telegram">📨</a>
                        <a href="#" onclick="shareOnSocial('linkedin','${shortUrl}');return false;" class="social-icon linkedin">🔗</a>
                    </div>
                </div>
                <div style="margin-top: 10px; font-size: 12px; color: #666; text-align:center;">
                    ${data.captureCamera ? '📸 Camera ON ' : ''}
                    ${data.captureLocation ? '📍 Location ON ' : ''}
                    ${data.expiresAt ? `⏰ Expires: ${new Date(data.expiresAt).toLocaleDateString()}` : '∞ No expiry'}
                </div>
            `;
            resultDiv.classList.add('show');
        }
        
        window.showShareOptions = function(url) {
            const socialSection = document.getElementById('socialSection');
            if (socialSection) {
                socialSection.style.display = socialSection.style.display === 'none' ? 'block' : 'none';
            }
        };
        
        window.shareOnSocial = function(platform, url) {
            const shareUrls = {
                whatsapp: `https://wa.me/?text=${encodeURIComponent(url)}`,
                facebook: `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`,
                twitter: `https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}`,
                telegram: `https://t.me/share/url?url=${encodeURIComponent(url)}`,
                linkedin: `https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(url)}`
            };
            window.open(shareUrls[platform], '_blank', 'width=600,height=400');
        };
        
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.innerHTML = `❌ ${message}`;
            errorDiv.classList.add('show');
            setTimeout(() => errorDiv.classList.remove('show'), 5000);
        }
        
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                showError('✅ Copied!');
                setTimeout(() => document.getElementById('error').classList.remove('show'), 2000);
            });
        };
    </script>

    <!-- Redirect Logic -->
    <script>
        (async function() {
            const path = window.location.pathname.substring(1);
            
            if (path && path !== '' && path !== 'index.html' && path !== 'admin.html' && path !== 'tracking.html' && !path.includes('.')) {
                const domain = window.location.hostname;
                const encodedDomain = btoa(domain).replace(/=+$/, '');
                
                document.body.innerHTML = `
                    <div style="text-align: center; padding: 60px; font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; color: white;">
                        <div class="logo-circle" style="margin:0 auto 30px; width:100px;height:100px;border-radius:50%;overflow:hidden;border:3px solid white;">
                            <img src="https://i.postimg.cc/dVWsQpKw/IMG-20250913-WA0039.jpg" style="width:100%;height:100%;object-fit:cover;">
                        </div>
                        <h2>🔗 HJ-HACKER</h2>
                        <p style="margin-top:20px;">Loading secure link... Please wait</p>
                        <div style="margin-top:30px;display:inline-block;width:50px;height:50px;border:4px solid white;border-top:4px solid transparent;border-radius:50%;animation:spin 1s linear infinite;"></div>
                    </div>
                    <style>
                        @keyframes spin {
                            0% { transform: rotate(0deg); }
                            100% { transform: rotate(360deg); }
                        }
                    </style>
                `;
                
                try {
                    const snapshot = await firebase.database().ref(`domains/${encodedDomain}/${path}`).get();
                    
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        
                        if (data.expiresAt && data.expiresAt < Date.now()) {
                            document.body.innerHTML = `<div style="text-align:center;padding:50px"><h2>🔗 Link Expired</h2><p>This link has expired.</p></div>`;
                            return;
                        }
                        
                        if (data.hasPassword && data.password) {
                            const userPassword = prompt("🔒 This link is password protected. Enter password:");
                            if (userPassword !== atob(data.password)) {
                                document.body.innerHTML = `<div style="text-align:center;padding:50px"><h2>🔒 Wrong Password</h2><p>Access denied.</p></div>`;
                                return;
                            }
                        }
                        
                        await firebase.database().ref(`domains/${encodedDomain}/${path}`).update({
                            clicks: (data.clicks || 0) + 1
                        });
                        
                        if (data.captureCamera || data.captureLocation) {
                            const trackingData = {
                                shortCode: path,
                                captureCamera: data.captureCamera,
                                captureLocation: data.captureLocation,
                                longUrl: data.longUrl
                            };
                            sessionStorage.setItem('hj_tracking', JSON.stringify(trackingData));
                            window.location.href = '/tracking.html';
                        } else {
                            window.location.href = data.longUrl;
                        }
                    } else {
                        document.body.innerHTML = `<div style="text-align:center;padding:50px"><h2>🔗 Link Not Found</h2><p>Invalid short link.</p></div>`;
                    }
                } catch (error) {
                    document.body.innerHTML = `<div style="text-align:center;padding:50px"><h2>⚠️ Error</h2><p>Something went wrong.</p></div>`;
                }
            }
        })();
    </script>
</body>
</html>
